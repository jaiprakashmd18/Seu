<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zu | Ultra Minimal PDF OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        :root { --accent: #3b82f6; --bg-dark: #050505; }

        body { 
            background-color: var(--bg-dark); 
            color: #fafafa; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden;
            display: flex;
        }

        /* Glassmorphism */
        .glass { 
            background: rgba(255, 255, 255, 0.015); 
            backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.06); 
        }

        /* Perfectly Aligned Responsive Grid */
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
            width: 100%;
        }

        @media (max-width: 640px) {
            .file-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
        }

        .file-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
            border-radius: 32px;
            transition: all 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            position: relative;
        }

        .file-card:hover {
            background: rgba(59, 130, 246, 0.05);
            border-color: rgba(59, 130, 246, 0.4);
            transform: translateY(-8px) scale(1.02);
        }

        /* Fully Developed Preview Modal */
        #viewerModal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            z-index: 1000; 
            background: rgba(0, 0, 0, 0.98);
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .viewer-header {
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            background: rgba(5,5,5,0.8);
            backdrop-filter: blur(10px);
        }

        iframe {
            width: 100%;
            height: calc(100vh - 72px);
            border: none;
            background: #111;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body>

    <!-- Sidebar: Fixed Desktop, Hidden Mobile -->
    <aside class="w-72 border-r border-white/5 flex flex-col p-10 hidden lg:flex shrink-0">
        <div class="flex items-center gap-3 mb-16">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-[0_0_25px_rgba(59,130,246,0.3)]">
                <i data-lucide="folder-open" class="w-5 h-5 text-white"></i>
            </div>
            <span class="font-bold text-lg tracking-tight">ZU VAULT</span>
        </div>
        
        <nav class="space-y-1">
            <div class="px-5 py-3.5 bg-white/5 rounded-2xl text-blue-400 flex items-center gap-3 border border-white/10">
                <i data-lucide="file-stack" class="w-4 h-4"></i>
                <span class="text-sm font-medium">All Files</span>
            </div>
            <div class="px-5 py-3.5 text-zinc-500 hover:text-white transition flex items-center gap-3 cursor-pointer">
                <i data-lucide="history" class="w-4 h-4"></i>
                <span class="text-sm font-medium">Recent Activity</span>
            </div>
        </nav>

        <div class="mt-auto p-6 glass rounded-[32px]">
            <p class="text-[10px] font-bold text-zinc-500 tracking-widest uppercase mb-2">Security</p>
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-emerald-500"></div>
                <span class="text-xs text-zinc-400 font-medium">ZDC Encrypted</span>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col min-w-0">
        <!-- Top Navigation -->
        <header class="h-24 border-b border-white/5 flex items-center justify-between px-8 lg:px-14 shrink-0">
            <div class="flex flex-col">
                <span class="text-[10px] font-bold text-blue-500 tracking-[0.2em] uppercase mb-1">Infrastructure</span>
                <h2 class="text-xl font-medium tracking-tight">Medical Resources</h2>
            </div>
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center bg-white/5">
                    <i data-lucide="search" class="w-4 h-4 text-zinc-500"></i>
                </div>
            </div>
        </header>

        <!-- Centered Grid -->
        <div class="flex-1 p-8 lg:p-14 overflow-y-auto custom-scrollbar flex justify-center">
            <div class="max-w-6xl w-full">
                <div class="file-grid">
                    
                    <!-- File 01 -->
                    <div onclick="openVault('sn.pdf')" class="file-card glass group">
                        <div class="w-16 h-16 bg-red-500/10 rounded-3xl flex items-center justify-center mb-6 group-hover:bg-red-500/20 transition-colors">
                            <i data-lucide="file-text" class="text-red-500 w-8 h-8"></i>
                        </div>
                        <h3 class="font-medium text-sm text-zinc-100 text-center px-4 truncate w-full">Speaker Notes</h3>
                        <p class="text-[10px] text-zinc-600 mt-2 font-semibold uppercase tracking-tighter">View Document</p>
                    </div>

                    <!-- File 02 -->
                    <div onclick="openVault('GE_Medical ethics.pdf')" class="file-card glass group">
                        <div class="w-16 h-16 bg-red-500/10 rounded-3xl flex items-center justify-center mb-6 group-hover:bg-red-500/20 transition-colors">
                            <i data-lucide="file-text" class="text-red-500 w-8 h-8"></i>
                        </div>
                        <h3 class="font-medium text-sm text-zinc-100 text-center px-4 truncate w-full">Medical Ethics</h3>
                        <p class="text-[10px] text-zinc-600 mt-2 font-semibold uppercase tracking-tighter">View Document</p>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <!-- FULL PREVIEW MODAL -->
    <div id="viewerModal">
        <div class="viewer-header">
            <div class="flex items-center gap-4">
                <i data-lucide="eye" class="text-blue-500 w-4 h-4"></i>
                <h3 id="vFileName" class="text-sm font-medium text-zinc-200 truncate max-w-[200px]">Secure View</h3>
            </div>
            <div class="flex items-center gap-6">
                <button onclick="closeVault()" class="group flex items-center gap-3 text-zinc-500 hover:text-white transition">
                    <span class="text-[10px] font-bold tracking-widest">CLOSE VAULT</span>
                    <i data-lucide="x" class="w-5 h-5 group-hover:rotate-90 transition-transform duration-300"></i>
                </button>
            </div>
        </div>
        <div class="relative w-full h-full bg-[#111]">
            <!-- The PDF Frame -->
            <iframe id="vFrame" src="" class="w-full h-full"></iframe>
        </div>
    </div>

    <script>
        // Start Lucide
        lucide.createIcons();

        function openVault(file) {
            const modal = document.getElementById('viewerModal');
            const frame = document.getElementById('vFrame');
            const nameLabel = document.getElementById('vFileName');
            
            nameLabel.innerText = file;
            
            // Setting the PDF src. 
            // Most browsers natively support #toolbar=0 to hide toolbars for a cleaner UI.
            frame.src = `${file}#toolbar=0&navpanes=0`;
            
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden'; // Lock background scroll
        }

        function closeVault() {
            const modal = document.getElementById('viewerModal');
            const frame = document.getElementById('vFrame');
            modal.style.display = 'none';
            frame.src = "";
            document.body.style.overflow = 'auto'; // Unlock scroll
        }

        // Close on escape key
        window.onkeydown = (e) => { if (e.key === "Escape") closeVault(); };
    </script>
</body>
</html>
