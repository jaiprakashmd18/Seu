<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zu Vault | PDF Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        body { 
            background-color: #050505; 
            color: #fafafa; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden;
            display: flex;
            height: 100vh;
        }

        /* High-end glass effect */
        .glass { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }

        /* Perfect Grid */
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 2rem;
            width: 100%;
        }

        @media (max-width: 640px) {
            .file-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
        }

        .file-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
            border-radius: 32px;
            transition: all 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            cursor: pointer;
        }

        .file-card:hover {
            background: rgba(59, 130, 246, 0.08);
            border-color: rgba(59, 130, 246, 0.4);
            transform: translateY(-8px);
        }

        /* Fullscreen Viewport for PDF */
        #pdfViewer { 
            display: none; 
            position: fixed; 
            inset: 0; 
            z-index: 1000; 
            background: #000;
            flex-direction: column;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <aside class="w-72 border-r border-white/5 flex flex-col p-10 hidden lg:flex shrink-0">
        <div class="flex items-center gap-3 mb-16">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-[0_0_20px_rgba(59,130,246,0.2)]">
                <i data-lucide="file-text" class="w-5 h-5 text-white"></i>
            </div>
            <span class="font-bold text-lg tracking-tight uppercase">Zu Vault</span>
        </div>
        
        <nav class="space-y-2">
            <div class="px-5 py-3 bg-white/5 rounded-2xl text-blue-400 flex items-center gap-3 border border-white/10">
                <i data-lucide="layout-grid" class="w-4 h-4"></i>
                <span class="text-sm font-medium tracking-tight">Medical Library</span>
            </div>
        </nav>
    </aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col min-w-0 bg-[#080808]">
        <header class="h-24 border-b border-white/5 flex items-center justify-between px-12 shrink-0">
            <h2 class="text-lg font-medium tracking-tight">Recent Resources</h2>
            <div class="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center bg-white/5">
                <i data-lucide="user" class="w-4 h-4 text-zinc-500"></i>
            </div>
        </header>

        <div class="flex-1 p-10 lg:p-14 overflow-y-auto custom-scrollbar flex justify-center">
            <div class="max-w-6xl w-full">
                <div class="file-grid">
                    
                    <!-- PDF: Speaker Notes -->
                    <div onclick="openPDF('sn.pdf')" class="file-card glass group">
                        <div class="w-16 h-16 bg-red-500/10 rounded-2xl flex items-center justify-center mb-6 group-hover:bg-red-500/20 transition-colors">
                            <i data-lucide="file-text" class="text-red-500 w-8 h-8"></i>
                        </div>
                        <h3 class="font-medium text-sm text-zinc-100 px-4 truncate w-full text-center">Speaker Notes</h3>
                        <p class="text-[10px] text-zinc-600 mt-2 font-bold uppercase tracking-widest">Click to Read</p>
                    </div>

                    <!-- PDF: Medical Ethics -->
                    <div onclick="openPDF('GE_Medical ethics.pdf')" class="file-card glass group">
                        <div class="w-16 h-16 bg-red-500/10 rounded-2xl flex items-center justify-center mb-6 group-hover:bg-red-500/20 transition-colors">
                            <i data-lucide="file-text" class="text-red-500 w-8 h-8"></i>
                        </div>
                        <h3 class="font-medium text-sm text-zinc-100 px-4 truncate w-full text-center">Medical Ethics</h3>
                        <p class="text-[10px] text-zinc-600 mt-2 font-bold uppercase tracking-widest">Click to Read</p>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <!-- FULLSCREEN PDF VIEWER -->
    <div id="pdfViewer">
        <div class="h-16 flex items-center justify-between px-8 border-b border-white/10 glass">
            <div class="flex items-center gap-3">
                <i data-lucide="eye" class="w-4 h-4 text-blue-500"></i>
                <span id="pdfName" class="text-sm font-medium text-zinc-300">File Preview</span>
            </div>
            <button onclick="closePDF()" class="flex items-center gap-2 text-zinc-500 hover:text-white transition">
                <span class="text-[10px] font-bold">CLOSE VAULT</span>
                <i data-lucide="x-circle" class="w-6 h-6"></i>
            </button>
        </div>
        <div class="flex-1">
            <!-- Loading PDF directly into iframe -->
            <iframe id="pdfFrame" src=""></iframe>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function openPDF(path) {
            const viewer = document.getElementById('pdfViewer');
            const frame = document.getElementById('pdfFrame');
            const title = document.getElementById('pdfName');

            title.innerText = path;
            // Native browsers support #view=FitH to open the PDF zoomed to width
            frame.src = path + "#view=FitH";
            
            viewer.style.display = 'flex';
        }

        function closePDF() {
            const viewer = document.getElementById('pdfViewer');
            const frame = document.getElementById('pdfFrame');
            
            viewer.style.display = 'none';
            frame.src = ""; // Clears the memory
        }

        // Close on Esc key
        window.onkeydown = (e) => { if (e.key === "Escape") closePDF(); };
    </script>
</body>
</html>
