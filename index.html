<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zu Storage | Perfect Alignment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        body { 
            background-color: #050505; 
            color: #fafafa; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden;
            display: flex;
        }

        /* Perfectly Centered Grid Items */
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.5rem;
            width: 100%;
        }

        .glass { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }

        .file-card {
            display: flex;
            flex-direction: column;
            align-items: center; /* Center content horizontally */
            text-align: center; /* Center text */
            padding: 2rem;
            border-radius: 24px;
            transition: all 0.3s ease;
            height: 100%;
        }

        .file-card:hover {
            background: rgba(59, 130, 246, 0.05);
            border-color: rgba(59, 130, 246, 0.4);
            transform: translateY(-5px);
        }

        /* Modal Overlay */
        #viewerModal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            z-index: 1000; 
            background: rgba(0, 0, 0, 0.95);
            padding: 2rem;
        }

        .viewer-window {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            border-radius: 24px;
            overflow: hidden;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <!-- Sidebar: Fixed Width for Alignment -->
    <aside class="w-64 border-r border-white/5 flex flex-col p-8 hidden lg:flex shrink-0">
        <div class="flex items-center gap-3 mb-12 justify-center lg:justify-start">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center">
                <i data-lucide="folder-kanban" class="w-5 h-5 text-white"></i>
            </div>
            <span class="font-bold text-lg tracking-tight">ZU DRIVE</span>
        </div>
        
        <nav class="space-y-2">
            <div class="px-4 py-3 bg-white/5 rounded-xl text-blue-400 flex items-center gap-3 border border-white/5 cursor-default">
                <i data-lucide="grid" class="w-4 h-4"></i>
                <span class="text-sm font-medium">Dashboard</span>
            </div>
            <div class="px-4 py-3 text-zinc-500 hover:text-white transition flex items-center gap-3 cursor-pointer">
                <i data-lucide="file-text" class="w-4 h-4"></i>
                <span class="text-sm font-medium">Documents</span>
            </div>
        </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col min-w-0">
        <!-- Top Bar: Perfectly Aligned with Main Content -->
        <header class="h-20 border-b border-white/5 flex items-center justify-between px-10 shrink-0">
            <div class="flex items-center gap-2 text-sm text-zinc-500">
                <span>Storage</span>
                <i data-lucide="chevron-right" class="w-3 h-3"></i>
                <span class="text-white">Recent Documents</span>
            </div>
            <div class="flex items-center gap-4">
                <button class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center hover:bg-white/10 transition">
                    <i data-lucide="bell" class="w-4 h-4 text-zinc-400"></i>
                </button>
            </div>
        </header>

        <!-- Scrollable Grid Container -->
        <div class="p-10 overflow-y-auto custom-scrollbar flex justify-center">
            <div class="max-w-7xl w-full"> <!-- Constraints width for better readability -->
                
                <div class="file-grid">
                    
                    <!-- File 1 -->
                    <div onclick="smartView('sn.docx')" class="file-card glass group">
                        <div class="w-16 h-16 bg-blue-500/10 rounded-2xl flex items-center justify-center mb-6 group-hover:bg-blue-500/20 transition-colors">
                            <i data-lucide="file-text" class="text-blue-500 w-8 h-8"></i>
                        </div>
                        <h3 class="font-medium text-[15px] text-zinc-200 truncate w-full">Speaker Notes</h3>
                        <p class="text-[10px] text-zinc-600 mt-2 tracking-widest uppercase">Word Document</p>
                    </div>

                    <!-- File 2 -->
                    <div onclick="smartView('GE_Medical ethics.pptx')" class="file-card glass group">
                        <div class="w-16 h-16 bg-orange-500/10 rounded-2xl flex items-center justify-center mb-6 group-hover:bg-orange-500/20 transition-colors">
                            <i data-lucide="presentation" class="text-orange-500 w-8 h-8"></i>
                        </div>
                        <h3 class="font-medium text-[15px] text-zinc-200 truncate w-full">Medical Ethics</h3>
                        <p class="text-[10px] text-zinc-600 mt-2 tracking-widest uppercase">PowerPoint</p>
                    </div>

                    <!-- File 3 -->
                    <div onclick="smartView('lab_report.pdf')" class="file-card glass group">
                        <div class="w-16 h-16 bg-red-500/10 rounded-2xl flex items-center justify-center mb-6 group-hover:bg-red-500/20 transition-colors">
                            <i data-lucide="file-digit" class="text-red-500 w-8 h-8"></i>
                        </div>
                        <h3 class="font-medium text-[15px] text-zinc-200 truncate w-full">Lab Report</h3>
                        <p class="text-[10px] text-zinc-600 mt-2 tracking-widest uppercase">PDF Archive</p>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <!-- FULLSCREEN MODAL VIEWER -->
    <div id="viewerModal">
        <div class="viewer-window glass flex flex-col shadow-2xl">
            <!-- Modal Header -->
            <div class="h-16 border-b border-white/5 flex items-center justify-between px-8 bg-black/20">
                <div class="flex items-center gap-3">
                    <i data-lucide="eye" class="w-4 h-4 text-blue-500"></i>
                    <span id="vFileName" class="text-sm font-medium truncate max-w-xs">File Preview</span>
                </div>
                <button onclick="closeViewer()" class="text-zinc-500 hover:text-white flex items-center gap-2 transition">
                    <span class="text-xs font-bold uppercase tracking-tighter">Close</span>
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <!-- Iframe Container -->
            <div class="flex-1 bg-[#111] relative">
                <iframe id="vFrame" src="" class="w-full h-full border-none"></iframe>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function smartView(file) {
            const modal = document.getElementById('viewerModal');
            const frame = document.getElementById('vFrame');
            const nameLabel = document.getElementById('vFileName');
            
            nameLabel.innerText = file;
            const ext = file.split('.').pop().toLowerCase();
            
            if (ext === 'pdf') {
                frame.src = file;
            } else {
                // Constructing the full URL for the external viewer
                const absoluteUrl = window.location.origin + '/' + file;
                frame.src = `https://view.officeapps.live.com/op/view.aspx?src=${encodeURIComponent(absoluteUrl)}`;
            }

            modal.style.display = 'block';
        }

        function closeViewer() {
            const modal = document.getElementById('viewerModal');
            const frame = document.getElementById('vFrame');
            modal.style.display = 'none';
            frame.src = "";
        }

        window.onkeydown = (e) => { if (e.key === "Escape") closeViewer(); };
    </script>
</body>
</html>
