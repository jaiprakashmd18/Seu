<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Drive | Zero-Config</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #e5e5e5; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .file-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .file-card:hover { background: rgba(255, 255, 255, 0.07); transform: translateY(-5px); border-color: rgba(59, 130, 246, 0.4); }
        
        #previewModal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); }
        .viewer-box { width: 95%; height: 88%; margin: 1.5% auto; border-radius: 20px; overflow: hidden; background: #111; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="flex h-screen">

    <!-- Sidebar -->
    <aside class="w-64 border-r border-white/5 flex flex-col p-8 hidden lg:flex shrink-0">
        <div class="flex items-center gap-3 mb-12">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg">
                <i data-lucide="database" class="w-5 h-5 text-white"></i>
            </div>
            <span class="font-semibold text-lg">MyStorage</span>
        </div>
        <nav class="space-y-2">
            <div class="px-4 py-2 bg-blue-500/10 text-blue-400 rounded-xl flex items-center gap-3 border border-blue-500/20">
                <i data-lucide="layout" class="w-4 h-4"></i> Overview
            </div>
            <div class="px-4 py-2 text-zinc-500 hover:text-white transition flex items-center gap-3">
                <i data-lucide="file" class="w-4 h-4"></i> Documents
            </div>
        </nav>
    </aside>

    <!-- Content -->
    <main class="flex-1 flex flex-col">
        <header class="h-20 border-b border-white/5 flex items-center px-10 justify-between">
            <h1 class="text-zinc-400 text-sm font-medium">Personal / <span class="text-white">Recent Files</span></h1>
        </header>

        <section class="p-10 overflow-y-auto">
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                
                <!-- Card: DOCX -->
                <div onclick="openViewer('sn.docx')" class="file-card glass p-6 rounded-3xl group">
                    <div class="w-14 h-14 bg-blue-500/10 rounded-2xl flex items-center justify-center mb-5 group-hover:bg-blue-500/20 transition-colors">
                        <i data-lucide="file-text" class="text-blue-500 w-7 h-7"></i>
                    </div>
                    <h3 class="font-medium text-[15px] truncate">Speaker Notes.docx</h3>
                    <p class="text-[10px] text-zinc-500 mt-2 uppercase tracking-widest">Open Reader</p>
                </div>

                <!-- Card: PPTX -->
                <div onclick="openViewer('GE_Medical ethics.pptx')" class="file-card glass p-6 rounded-3xl group">
                    <div class="w-14 h-14 bg-orange-500/10 rounded-2xl flex items-center justify-center mb-5 group-hover:bg-orange-500/20 transition-colors">
                        <i data-lucide="presentation" class="text-orange-500 w-7 h-7"></i>
                    </div>
                    <h3 class="font-medium text-[15px] truncate">Medical ethics.pptx</h3>
                    <p class="text-[10px] text-zinc-500 mt-2 uppercase tracking-widest">View Slides</p>
                </div>

                <!-- Card: PDF (Always works best) -->
                <div onclick="openViewer('sample.pdf')" class="file-card glass p-6 rounded-3xl group">
                    <div class="w-14 h-14 bg-red-500/10 rounded-2xl flex items-center justify-center mb-5 group-hover:bg-red-500/20 transition-colors">
                        <i data-lucide="file-digit" class="text-red-500 w-7 h-7"></i>
                    </div>
                    <h3 class="font-medium text-[15px] truncate">Manual.pdf</h3>
                    <p class="text-[10px] text-zinc-500 mt-2 uppercase tracking-widest">Preview PDF</p>
                </div>

            </div>
        </section>
    </main>

    <!-- THE VIEWER MODAL -->
    <div id="previewModal">
        <div class="flex items-center justify-between px-10 py-5">
            <div class="flex items-center gap-3">
                <i data-lucide="eye" class="text-blue-500 w-4 h-4"></i>
                <span id="vTitle" class="text-sm font-medium">Previewing File</span>
            </div>
            <button onclick="closeViewer()" class="text-zinc-500 hover:text-white flex items-center gap-2 transition">
                <span class="text-xs">Esc to Close</span>
                <i data-lucide="circle-x" class="w-6 h-6"></i>
            </button>
        </div>
        <div class="viewer-box">
            <iframe id="vFrame" src="" class="w-full h-full border-none"></iframe>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function openViewer(file) {
            const modal = document.getElementById('previewModal');
            const frame = document.getElementById('vFrame');
            const title = document.getElementById('vTitle');
            
            title.innerText = file;
            const ext = file.split('.').pop().toLowerCase();
            
            // Logic: If PDF, open directly. If Office, use Microsoft Online Viewer.
            if (ext === 'pdf') {
                frame.src = file;
            } else {
                // To test this locally, the file must eventually be on a real URL.
                // For now, it will attempt to use Microsoft's engine.
                const fullUrl = encodeURIComponent(window.location.origin + '/' + file);
                frame.src = `https://view.officeapps.live.com/op/view.aspx?src=${fullUrl}`;
            }

            modal.style.display = 'block';
        }

        function closeViewer() {
            const modal = document.getElementById('previewModal');
            const frame = document.getElementById('vFrame');
            modal.style.display = 'none';
            frame.src = "";
        }

        window.onkeydown = (e) => { if (e.key === "Escape") closeViewer(); };
    </script>
</body>
</html>
