<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Drive | Minimal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #050505; color: #e5e5e5; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .file-card:hover { background: rgba(255, 255, 255, 0.07); transform: translateY(-2px); transition: all 0.2s ease; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 border-r border-white/5 flex flex-col p-6 hidden md:flex">
        <div class="flex items-center gap-3 mb-10 px-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                <i data-lucide="hard-drive" class="w-5 h-5 text-white"></i>
            </div>
            <span class="font-bold tracking-tight">STORAGE</span>
        </div>
        
        <nav class="space-y-2 flex-1">
            <a href="#" class="flex items-center gap-3 px-3 py-2 bg-white/5 rounded-lg text-blue-400">
                <i data-lucide="folder" class="w-4 h-4"></i> All Files
            </a>
            <a href="#" class="flex items-center gap-3 px-3 py-2 hover:bg-white/5 rounded-lg transition">
                <i data-lucide="file-text" class="w-4 h-4"></i> Documents
            </a>
            <a href="#" class="flex items-center gap-3 px-3 py-2 hover:bg-white/5 rounded-lg transition">
                <i data-lucide="presentation" class="w-4 h-4"></i> Presentations
            </a>
            <a href="#" class="flex items-center gap-3 px-3 py-2 hover:bg-white/5 rounded-lg transition">
                <i data-lucide="clock" class="w-4 h-4"></i> Recent
            </a>
        </nav>

        <div class="mt-auto p-4 glass rounded-xl">
            <p class="text-xs text-zinc-500 mb-2">Used 12.4 GB of 50 GB</p>
            <div class="w-full bg-white/10 h-1.5 rounded-full overflow-hidden">
                <div class="bg-blue-600 h-full w-1/4"></div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col">
        <!-- Header -->
        <header class="h-16 border-b border-white/5 flex items-center justify-between px-8">
            <div class="relative w-96">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500"></i>
                <input type="text" placeholder="Search files..." class="w-full bg-white/5 border border-white/10 rounded-full py-1.5 pl-10 pr-4 text-sm focus:outline-none focus:border-blue-500/50 transition">
            </div>
            <div class="flex items-center gap-4">
                <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-lg text-sm font-medium transition">
                    Upload New
                </button>
            </div>
        </header>

        <!-- Grid -->
        <section class="p-8 overflow-y-auto">
            <h2 class="text-sm font-semibold text-zinc-500 uppercase tracking-wider mb-6">Recent Documents</h2>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                
                <!-- PDF File -->
                <div class="file-card glass p-4 rounded-2xl cursor-pointer">
                    <div class="w-12 h-12 bg-red-500/10 rounded-xl flex items-center justify-center mb-4">
                        <i data-lucide="file-text" class="text-red-500"></i>
                    </div>
                    <h3 class="font-medium text-sm truncate">Annual_Report_2024.pdf</h3>
                    <p class="text-xs text-zinc-500 mt-1">2.4 MB • 2 hours ago</p>
                </div>

                <!-- PPTX File -->
                <div class="file-card glass p-4 rounded-2xl cursor-pointer">
                    <div class="w-12 h-12 bg-orange-500/10 rounded-xl flex items-center justify-center mb-4">
                        <i data-lucide="presentation" class="text-orange-500"></i>
                    </div>
                    <h3 class="font-medium text-sm truncate">Project_Pitch.pptx</h3>
                    <p class="text-xs text-zinc-500 mt-1">15.8 MB • Yesterday</p>
                </div>

                <!-- Doc File -->
                <div class="file-card glass p-4 rounded-2xl cursor-pointer">
                    <div class="w-12 h-12 bg-blue-500/10 rounded-xl flex items-center justify-center mb-4">
                        <i data-lucide="file" class="text-blue-500"></i>
                    </div>
                    <h3 class="font-medium text-sm truncate">Tech_Stack_Proposal.docx</h3>
                    <p class="text-xs text-zinc-500 mt-1">842 KB • 3 days ago</p>
                </div>

                <!-- Generic File -->
                <div class="file-card glass p-4 rounded-2xl cursor-pointer">
                    <div class="w-12 h-12 bg-zinc-500/10 rounded-xl flex items-center justify-center mb-4">
                        <i data-lucide="file-code" class="text-zinc-400"></i>
                    </div>
                    <h3 class="font-medium text-sm truncate">index.html</h3>
                    <p class="text-xs text-zinc-500 mt-1">12 KB • 1 week ago</p>
                </div>

            </div>
        </section>
    </main>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>
</html>
