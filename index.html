<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zu Storage | Auto-Fit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        body { 
            background-color: #050505; 
            color: #fafafa; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden;
            display: flex;
            flex-direction: column; /* Stack for mobile */
        }

        @media (min-width: 1024px) {
            body { flex-direction: row; } /* Side-by-side for desktop */
        }

        .glass { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }

        /* Fluid Grid System */
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
        }

        @media (min-width: 640px) {
            .file-grid {
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
                gap: 1.5rem;
            }
        }

        .file-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 1.5rem;
            border-radius: 20px;
            transition: all 0.3s ease;
            height: 100%;
            cursor: pointer;
        }

        .file-card:hover {
            background: rgba(59, 130, 246, 0.07);
            border-color: rgba(59, 130, 246, 0.4);
            transform: translateY(-4px);
        }

        #viewerModal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            z-index: 1000; 
            background: #000;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <!-- Responsive Sidebar / Mobile Bottom Nav -->
    <aside class="w-full lg:w-64 border-b lg:border-r lg:border-b-0 border-white/5 flex lg:flex-col p-4 lg:p-8 order-2 lg:order-1 shrink-0 bg-[#050505]">
        <div class="hidden lg:flex items-center gap-3 mb-12">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg">
                <i data-lucide="folder-kanban" class="w-5 h-5 text-white"></i>
            </div>
            <span class="font-bold text-lg tracking-tight">ZU DRIVE</span>
        </div>
        
        <nav class="flex lg:flex-col w-full justify-around lg:justify-start gap-2">
            <div class="flex-1 lg:flex-none px-4 py-3 bg-white/5 rounded-xl text-blue-400 flex flex-col lg:flex-row items-center gap-1 lg:gap-3 border border-white/5 transition">
                <i data-lucide="grid" class="w-5 lg:w-4 h-5 lg:h-4"></i>
                <span class="text-[10px] lg:text-sm font-medium">Files</span>
            </div>
            <div class="flex-1 lg:flex-none px-4 py-3 text-zinc-500 hover:text-white flex flex-col lg:flex-row items-center gap-1 lg:gap-3 transition cursor-pointer">
                <i data-lucide="star" class="w-5 lg:w-4 h-5 lg:h-4"></i>
                <span class="text-[10px] lg:text-sm font-medium">Starred</span>
            </div>
            <div class="flex-1 lg:flex-none px-4 py-3 text-zinc-500 hover:text-white flex flex-col lg:flex-row items-center gap-1 lg:gap-3 transition cursor-pointer">
                <i data-lucide="settings" class="w-5 lg:w-4 h-5 lg:h-4"></i>
                <span class="text-[10px] lg:text-sm font-medium">Settings</span>
            </div>
        </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col min-w-0 order-1 lg:order-2">
        <!-- Header -->
        <header class="h-16 lg:h-20 border-b border-white/5 flex items-center justify-between px-6 lg:px-10 shrink-0">
            <div class="flex items-center gap-2 text-xs lg:text-sm text-zinc-500">
                <span class="hidden sm:inline">Personal</span>
                <i data-lucide="chevron-right" class="w-3 h-3 hidden sm:inline"></i>
                <span class="text-white">Recent Docs</span>
            </div>
            <div class="w-8 h-8 rounded-full bg-blue-600/20 border border-blue-500/30 flex items-center justify-center">
                <span class="text-[10px] font-bold text-blue-400">ZD</span>
            </div>
        </header>

        <!-- Grid Container -->
        <div class="flex-1 p-6 lg:p-10 overflow-y-auto custom-scrollbar flex justify-center">
            <div class="max-w-7xl w-full">
                <div class="file-grid">
                    
                    <!-- File 1 -->
                    <div onclick="smartView('sn.pdf')" class="file-card glass group">
                        <div class="w-12 h-12 lg:w-16 lg:h-16 bg-blue-500/10 rounded-2xl flex items-center justify-center mb-4 lg:mb-6 group-hover:bg-blue-500/20 transition-colors">
                            <i data-lucide="file-text" class="text-blue-500 w-6 h-6 lg:w-8 lg:h-8"></i>
                        </div>
                        <h3 class="font-medium text-xs lg:text-[15px] text-zinc-200 truncate w-full">Speaker Notes</h3>
                        <p class="text-[9px] text-zinc-600 mt-1 uppercase">DOCX</p>
                    </div>

                    <!-- File 2 -->
                    <div onclick="smartView('GE_Medical ethics.pdf')" class="file-card glass group">
                        <div class="w-12 h-12 lg:w-16 lg:h-16 bg-orange-500/10 rounded-2xl flex items-center justify-center mb-4 lg:mb-6 group-hover:bg-orange-500/20 transition-colors">
                            <i data-lucide="presentation" class="text-orange-500 w-6 h-6 lg:w-8 lg:h-8"></i>
                        </div>
                        <h3 class="font-medium text-xs lg:text-[15px] text-zinc-200 truncate w-full">Medical Ethics</h3>
                        <p class="text-[9px] text-zinc-600 mt-1 uppercase">PPTX</p>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <!-- FULLSCREEN MODAL VIEWER (Now with Responsive Controls) -->
    <div id="viewerModal">
        <div class="h-full flex flex-col overflow-hidden">
            <div class="h-16 border-b border-white/5 flex items-center justify-between px-6 bg-black">
                <span id="vFileName" class="text-xs font-medium truncate max-w-[50%]">File Preview</span>
                <button onclick="closeViewer()" class="text-zinc-500 hover:text-white flex items-center gap-2">
                    <span class="text-[10px] font-bold">CLOSE</span>
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="flex-1 bg-[#111]">
                <iframe id="vFrame" src="" class="w-full h-full border-none"></iframe>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function smartView(file) {
            const modal = document.getElementById('viewerModal');
            const frame = document.getElementById('vFrame');
            const nameLabel = document.getElementById('vFileName');
            
            nameLabel.innerText = file;
            const ext = file.split('.').pop().toLowerCase();
            
            if (ext === 'pdf') {
                frame.src = file;
            } else {
                const absoluteUrl = window.location.origin + '/' + file;
                frame.src = `https://view.officeapps.live.com/op/view.aspx?src=${encodeURIComponent(absoluteUrl)}`;
            }

            modal.style.display = 'block';
        }

        function closeViewer() {
            document.getElementById('viewerModal').style.display = 'none';
            document.getElementById('vFrame').src = "";
        }

        window.onkeydown = (e) => { if (e.key === "Escape") closeViewer(); };
    </script>
</body>
</html>
