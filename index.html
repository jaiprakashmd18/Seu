<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Drive | Minimal Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #e5e5e5; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .file-card { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .file-card:hover { background: rgba(255, 255, 255, 0.08); transform: translateY(-4px); border-color: rgba(59, 130, 246, 0.5); }
        
        /* Modal Styles */
        #previewModal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); }
        .viewer-container { width: 90%; height: 85%; margin: 2% auto; border-radius: 24px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-72 border-r border-white/5 flex flex-col p-8 hidden md:flex">
        <div class="flex items-center gap-3 mb-12">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-900/20">
                <i data-lucide="folder-closed" class="w-5 h-5 text-white"></i>
            </div>
            <span class="font-semibold text-lg tracking-tight text-white">CloudSpace</span>
        </div>
        
        <nav class="space-y-1.5 flex-1">
            <a href="#" class="flex items-center gap-3 px-4 py-2.5 bg-white/5 rounded-xl text-blue-400 border border-white/5">
                <i data-lucide="layout-grid" class="w-4 h-4"></i> Dashboard
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-2.5 hover:bg-white/5 rounded-xl transition text-zinc-400 hover:text-white">
                <i data-lucide="file-text" class="w-4 h-4"></i> Documents
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-2.5 hover:bg-white/5 rounded-xl transition text-zinc-400 hover:text-white">
                <i data-lucide="star" class="w-4 h-4"></i> Favorites
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-20 border-b border-white/5 flex items-center justify-between px-10 shrink-0">
            <div class="relative w-full max-w-md">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500"></i>
                <input type="text" placeholder="Search your library..." class="w-full bg-white/5 border border-white/10 rounded-xl py-2.5 pl-12 pr-4 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500/50 transition">
            </div>
        </header>

        <section class="p-10 overflow-y-auto">
            <h2 class="text-xl font-medium tracking-tight mb-8">Recent Files</h2>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                
                <!-- Word Doc Card -->
                <div onclick="openPreview('sn.docx')" class="file-card glass p-5 rounded-3xl block group">
                    <div class="w-14 h-14 bg-red-500/10 rounded-2xl flex items-center justify-center mb-5 group-hover:bg-red-500/20 transition-colors">
                        <i data-lucide="file-text" class="text-red-500 w-7 h-7"></i>
                    </div>
                    <h3 class="font-medium text-[15px] truncate text-zinc-200">Speaker Notes.docx</h3>
                    <p class="text-xs text-zinc-500 mt-1.5 flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 rounded-full bg-red-500"></span> Click to View
                    </p>
                </div>

                <!-- PowerPoint Card -->
                <div onclick="openPreview('GE_Medical ethics.pptx')" class="file-card glass p-5 rounded-3xl block group">
                    <div class="w-14 h-14 bg-orange-500/10 rounded-2xl flex items-center justify-center mb-5 group-hover:bg-orange-500/20 transition-colors">
                        <i data-lucide="presentation" class="text-orange-500 w-7 h-7"></i>
                    </div>
                    <h3 class="font-medium text-[15px] truncate text-zinc-200">medical ethics(GE).pptx</h3>
                    <p class="text-xs text-zinc-500 mt-1.5 flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 rounded-full bg-orange-500"></span> Click to View
                    </p>
                </div>

            </div>
        </section>
    </main>

    <!-- THE PREVIEW MODAL -->
    <div id="previewModal">
        <div class="flex items-center justify-between px-10 py-6">
            <h3 id="modalFileName" class="text-white font-medium">File Preview</h3>
            <button onclick="closePreview()" class="flex items-center gap-2 text-zinc-400 hover:text-white transition">
                <span>Close</span>
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>
        <div class="viewer-container glass">
            <iframe id="previewFrame" src="" class="w-full h-full border-none"></iframe>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function openPreview(fileName) {
            const modal = document.getElementById('previewModal');
            const frame = document.getElementById('previewFrame');
            const title = document.getElementById('modalFileName');

            // Set the filename in the header
            title.innerText = fileName;

            // Important: Microsoft/Google Viewers require a full URL to work.
            // Replace 'https://yourwebsite.com/' with your actual live domain.
            const siteUrl = window.location.origin + '/' + fileName;
            
            // Using Google Docs Viewer to render the Office files
            frame.src = `https://docs.google.com/gview?url=${siteUrl}&embedded=true`;
            
            modal.style.display = 'block';
        }

        function closePreview() {
            const modal = document.getElementById('previewModal');
            const frame = document.getElementById('previewFrame');
            
            modal.style.display = 'none';
            frame.src = ""; // Stop loading the file when closed
        }

        // Close when pressing 'Esc' key
        window.onkeydown = function(e) {
            if (e.key === "Escape") closePreview();
        }
    </script>
</body>
</html>
